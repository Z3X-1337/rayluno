name: Clean Security Audit Generation

on:
  push:
    branches: ["agent/security-audit-hardening-v3"]
    paths:
      - ".github/workflows/apply-security-audit-hardening.yml"

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-audit-hardening-v3
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Remove duplicate generated imports
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "src/future_assistant/audit.py": (
                  "from .local_security import keyed_digest, load_or_create_key, secure_directory, secure_file\n"
                  "from .local_security import keyed_digest, load_or_create_key, secure_directory, secure_file\n",
                  "from .local_security import (\n"
                  "    keyed_digest,\n"
                  "    load_or_create_key,\n"
                  "    secure_directory,\n"
                  "    secure_file,\n"
                  ")\n",
              ),
              "src/future_assistant/memory.py": (
                  "from .local_security import secure_directory, secure_file\n"
                  "from .local_security import secure_directory, secure_file\n",
                  "from .local_security import secure_directory, secure_file\n",
              ),
              "src/future_assistant/tasks.py": (
                  "from .local_security import secure_directory, secure_file\n"
                  "from .local_security import secure_directory, secure_file\n",
                  "from .local_security import secure_directory, secure_file\n",
              ),
              "src/future_assistant/reminders.py": (
                  "from .local_security import secure_directory, secure_file\n"
                  "from .local_security import secure_directory, secure_file\n",
                  "from .local_security import secure_directory, secure_file\n",
              ),
              "src/future_assistant/verified_skills.py": (
                  "from .local_security import (\n"
                  "    atomic_write_bytes,\n"
                  "    keyed_digest,\n"
                  "    load_or_create_key,\n"
                  "    secure_directory,\n"
                  "    secure_file,\n"
                  ")\n"
                  "from .local_security import (\n"
                  "    atomic_write_bytes,\n"
                  "    keyed_digest,\n"
                  "    load_or_create_key,\n"
                  "    secure_directory,\n"
                  "    secure_file,\n"
                  ")\n",
                  "from .local_security import (\n"
                  "    atomic_write_bytes,\n"
                  "    keyed_digest,\n"
                  "    load_or_create_key,\n"
                  "    secure_directory,\n"
                  "    secure_file,\n"
                  ")\n",
              ),
          }

          for filename, (old, new) in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected duplicate import was not found in {filename}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Format product and tests
        run: |
          python -m pip install --disable-pip-version-check ruff
          python -m ruff format src tests
          python -m ruff check --fix src tests

      - name: Commit cleanup
        run: |
          git config user.name "rayluno-security-bot"
          git config user.email "security-bot@users.noreply.github.com"
          git add src tests
          git commit -m "Clean generated security hardening imports"
          git push origin HEAD:agent/security-audit-hardening-v3
