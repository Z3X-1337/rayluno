name: Apply Security Audit Hardening

on:
  push:
    branches: ["agent/security-audit-hardening-v3"]
    paths:
      - "tools/audit_patch/**"
      - ".github/workflows/apply-security-audit-hardening.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-audit-hardening-v3
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply audited transformations
        run: |
          python tools/audit_patch/patch_local_privacy.py
          python tools/audit_patch/patch_receipts.py
          python tools/audit_patch/patch_runtime_judge.py
          python tools/audit_patch/patch_existing_tests.py

      - name: Format generated Python
        run: |
          python -m pip install --disable-pip-version-check ruff
          python -m ruff format src tests tools/audit_patch

      - name: Commit generated hardening
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "rayluno-security-bot"
          git config user.email "security-bot@users.noreply.github.com"
          git add src tests docs tools/audit_patch
          git commit -m "Harden local trust, receipts, memory, and Judge Mode"
          git push origin HEAD:agent/security-audit-hardening-v3
