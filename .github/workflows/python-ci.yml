name: Python CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and verification dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,commercial]"

      - name: Compile source
        run: python -m compileall -q src

      - name: Check UI JavaScript syntax
        run: >-
          python -c "import pathlib, subprocess;
          [subprocess.run(['node', '--check', str(path)], check=True)
          for path in sorted(pathlib.Path('src/future_assistant/ui').glob('*.js'))]"

      - name: Run tests
        run: python -m pytest --junitxml=pytest-results.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.os }}-${{ matrix.python-version }}
          path: pytest-results.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .
