name: Format Trust Center

on:
  push:
    branches: ["agent/trust-center"]
    paths: [".github/workflows/format-trust-center.yml"]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trust-center
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install ruff
      - run: python -m ruff format src/future_assistant/ui/verified_window.py tests/test_trust_center.py
      - run: python -m ruff check src/future_assistant/ui/verified_window.py tests/test_trust_center.py
      - name: Commit formatting
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "rayluno-ui-bot"
          git config user.email "ui-bot@users.noreply.github.com"
          git add src/future_assistant/ui/verified_window.py tests/test_trust_center.py
          git commit -m "Format Trust Center Python contract"
          git push origin HEAD:agent/trust-center
