name: Competition Format Diagnostic

on:
  pull_request:
  push:
    branches:
      - competition/ui-voice-proof-polish

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.6"
      - name: Capture format diff
        shell: bash
        run: |
          python -m ruff format --check --diff . > ruff-format.diff || true
          cat ruff-format.diff
      - uses: actions/upload-artifact@v4
        with:
          name: competition-ruff-format-diff
          path: ruff-format.diff
          if-no-files-found: error
          retention-days: 1
