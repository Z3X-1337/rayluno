name: Ruff Diagnostic

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/ruff-diagnostic.yml"
      - "src/**"
      - "tests/**"
      - "tools/audit_patch/**"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install ruff
      - name: Capture Ruff output
        run: python -m ruff check . > ruff-diagnostic.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostic
          path: ruff-diagnostic.txt
          if-no-files-found: error
