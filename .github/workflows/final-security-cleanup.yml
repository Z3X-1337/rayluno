name: Final Security Cleanup

on:
  push:
    branches: ["agent/security-audit-hardening-v3"]
    paths:
      - ".github/workflows/final-security-cleanup.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-audit-hardening-v3
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply final manual-review fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          skills = Path("src/future_assistant/verified_skills.py")
          text = skills.read_text(encoding="utf-8")
          text = text.replace(
              '_ANCHOR_SCHEMA = "rayluno.receipt-anchor/v1"\n'
              '_ANCHOR_SCHEMA = "rayluno.receipt-anchor/v1"\n',
              '_ANCHOR_SCHEMA = "rayluno.receipt-anchor/v1"\n',
              1,
          )
          text = text.replace(
              '    def verify_integrity(self, *, reload: bool = True) -> bool: ...\n\n'
              '    def record(\n',
              '    def verify_integrity(self, *, reload: bool = True) -> bool: ...\n\n'
              '    def fingerprint_arguments(self, arguments: Mapping[str, object]) -> str: ...\n\n'
              '    def record(\n',
              1,
          )
          text = text.replace(
              '    def authenticated_checkpoint(self) -> bool:\n'
              '        return self.path is not None and self._anchor_path is not None\n\n'
              '    def verify_integrity',
              '    def authenticated_checkpoint(self) -> bool:\n'
              '        return bool(\n'
              '            self.path is not None\n'
              '            and self._anchor_path is not None\n'
              '            and self._anchor_path.exists()\n'
              '            and self.integrity_ok\n'
              '        )\n\n'
              '    def fingerprint_arguments(self, arguments: Mapping[str, object]) -> str:\n'
              '        return keyed_digest(\n'
              '            self._integrity_key,\n'
              '            {"domain": "rayluno.receipt.arguments/v1", "arguments": dict(arguments)},\n'
              '        )\n\n'
              '    def verify_integrity',
              1,
          )
          text = text.replace(
              '                "argument_digest": keyed_digest(\n'
              '                    self._integrity_key,\n'
              '                    {"domain": "rayluno.receipt.arguments/v1", "arguments": arguments},\n'
              '                ),\n',
              '                "argument_digest": self.fingerprint_arguments(arguments),\n',
              1,
          )
          skills.write_text(text, encoding="utf-8")

          runtime = Path("src/future_assistant/verified_runtime.py")
          text = runtime.read_text(encoding="utf-8")
          text = text.replace("import hashlib\nimport json\n", "", 1)
          text = text.replace("from collections.abc import Callable, Mapping\n", "from collections.abc import Callable\n", 1)
          text = text.replace(
              "            argument_digest=self._digest(arguments),\n",
              "            argument_digest=self.receipt_ledger.fingerprint_arguments(arguments),\n",
              1,
          )
          digest_start = text.find("    @staticmethod\n    def _digest(value: Mapping[str, object]) -> str:\n")
          if digest_start != -1:
              digest_end = text.find("    @staticmethod\n    def _confirmation_matches", digest_start)
              text = text[:digest_start] + text[digest_end:]
          duplicate = (
              "    @staticmethod\n"
              "    def _authorization_failure_message(language: Language) -> str:\n"
              "        if language is Language.EN:\n"
              '            return "No action was executed because authorization proof could not be sealed."\n'
              '        return "لم يُنفّذ أي إجراء لأن تعذّر ختم إثبات التصريح بالتنفيذ."\n\n'
          )
          first = text.find(duplicate)
          second = text.find(duplicate, first + len(duplicate)) if first != -1 else -1
          if second != -1:
              text = text[:second] + text[second + len(duplicate):]
          runtime.write_text(text, encoding="utf-8")

          tests = Path("tests/test_security_audit_hardening.py")
          text = tests.read_text(encoding="utf-8")
          needle = '    assert pending is not None\n    assert str(pending["confirmation_id"]) not in repr(audit.records)\n'
          replacement = (
              '    assert pending is not None\n'
              '    plain = hashlib.sha256(\n'
              '        json.dumps(\n'
              '            {"0:app_id": "calculator"},\n'
              '            sort_keys=True,\n'
              '            separators=(",", ":"),\n'
              '        ).encode()\n'
              '    ).hexdigest()\n'
              '    assert pending["argument_digest"] != plain\n'
              '    assert str(pending["confirmation_id"]) not in repr(audit.records)\n'
          )
          if needle not in text:
              raise SystemExit("Expected confirmation privacy assertion was not found")
          tests.write_text(text.replace(needle, replacement, 1), encoding="utf-8")

          audit_doc = Path("docs/SECURITY_AUDIT_2026-07-20.md")
          text = audit_doc.read_text(encoding="utf-8")
          text = text.replace(
              "The authenticated local checkpoint is not a hardware-backed signature or a remote transparency log. ",
              "The authenticated local checkpoint is not a hardware-backed signature or a remote transparency log. "
              "A process running as the same operating-system user that can read the local HMAC key can forge local state. ",
              1,
          )
          audit_doc.write_text(text, encoding="utf-8")
          PY
      - name: Format and validate changed files
        run: |
          python -m pip install --disable-pip-version-check ruff
          python -m ruff format src/future_assistant/verified_skills.py src/future_assistant/verified_runtime.py tests/test_security_audit_hardening.py
          python -m ruff check src/future_assistant/verified_skills.py src/future_assistant/verified_runtime.py tests/test_security_audit_hardening.py
      - name: Commit final cleanup
        run: |
          git config user.name "rayluno-security-bot"
          git config user.email "security-bot@users.noreply.github.com"
          git add src tests docs
          git commit -m "Finalize authenticated fingerprints and trust boundaries"
          git push origin HEAD:agent/security-audit-hardening-v3
